<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>過去の大会記録</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div id="setup-error" class="setup-error" style="display:none;">
  <div class="badge">⚠ SETUP REQUIRED</div>
  <h1>Firebase の設定が必要です</h1>
  <p class="small">
    <code>js/firebase-config.js</code> に Firebase プロジェクトの設定値を貼り付けてください。<br />
    手順は <code>README.md</code> を参照してください。
  </p>
</div>

<div id="app" style="display:none;">
  <div class="badge">📖 ARCHIVE</div>
  <h1>過去の大会記録</h1>
  <p class="small"><a href="index.html" style="color:var(--amber);">← 操縦席へ戻る</a></p>

  <div class="panel">
    <h2>検索</h2>
    <div class="row">
      <div style="flex:1;">
        <label>大会名</label>
        <input type="text" id="search-name-input" placeholder="大会名の一部を入力" />
      </div>
    </div>
    <div class="row" style="margin-top:10px;">
      <div style="flex:1;">
        <label>日付</label>
        <input type="date" id="search-date-input" />
      </div>
      <button class="ghost" id="clear-search-btn">クリア</button>
    </div>
  </div>

  <div class="panel">
    <h2>試合一覧</h2>
    <p class="small" id="results-empty" style="display:none;">該当する記録が見つかりません。</p>
    <div id="results-list"></div>
  </div>

  <div class="panel" id="detail-panel" style="display:none;">
    <h2>試合の詳細</h2>
    <button class="ghost" id="close-detail-btn" style="width:100%; margin-bottom:12px;">✕ 閉じる</button>
    <div id="detail-tournament-name" style="font-weight:700; margin-bottom:4px;"></div>
    <div id="detail-tournament-datetime" class="small" style="margin-bottom:12px;"></div>
    <div class="score-table-wrap">
      <table class="score-table">
        <thead><tr id="detail-score-head"></tr></thead>
        <tbody id="detail-score-body"></tbody>
      </table>
    </div>
    <div class="tabs" style="margin-top:16px;">
      <button id="detail-tab-away">アウェイ 打順</button>
      <button id="detail-tab-home">ホーム 打順</button>
    </div>
    <ul class="order-list" id="detail-order-away"></ul>
    <ul class="order-list" id="detail-order-home"></ul>
  </div>
</div>

<script type="module" src="js/history.js"></script>
</body>
</html>
